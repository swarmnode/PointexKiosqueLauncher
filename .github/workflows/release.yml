name: Release

# Triggered by pushing a version tag (e.g. `v1.0.3`):
#   git tag v1.0.3 && git push origin v1.0.3
#
# Builds the signed release APK, publishes it as a GitHub Release asset
# named `PointexKiosqueLauncher.apk` (plus a transitional `app-release.apk`
# copy so provisioning QR codes generated before the rename keep working),
# then regenerates the Device Owner provisioning QR code
# (tools/generate_provisioning_qr.py) pointing at the stable
# `releases/latest/download/PointexKiosqueLauncher.apk` URL and uploads it
# as `provisioning_qr.png` on the same release. Also builds and uploads the
# two QR-display companion apps (PrepaKiosquePointex.apk / .exe).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      # Same debug keystore used for local releases, so every build shares
      # the same signing certificate and can be installed as an update.
      - name: Restore release keystore
        run: |
          mkdir -p ~/.android
          echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 -d > ~/.android/debug.keystore

      - name: Build release APKs
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp app/build/outputs/apk/release/app-release.apk PointexKiosqueLauncher.apk
          # app-release.apk is uploaded as a second, identical asset so QR
          # codes printed before the rename (they embed the old
          # `latest/download/app-release.apk` URL) keep provisioning.
          # Drop it once no old QR is in circulation.
          gh release create "${{ github.ref_name }}" \
            PointexKiosqueLauncher.apk \
            app/build/outputs/apk/release/app-release.apk \
            --title "PointexKioskLauncher ${{ github.ref_name }}" \
            --generate-notes

      - name: Upload QR display APK to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp qr-display-android/build/outputs/apk/release/PrepaKiosquePointex-release.apk PrepaKiosquePointex.apk
          gh release upload "${{ github.ref_name }}" PrepaKiosquePointex.apk

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate provisioning QR code
        env:
          WIFI_SSID: ${{ secrets.WIFI_SSID }}
          WIFI_PASSWORD: ${{ secrets.WIFI_PASSWORD }}
        run: |
          pip install "qrcode[pil]"
          python tools/generate_provisioning_qr.py \
            app/build/outputs/apk/release/app-release.apk \
            "https://github.com/${{ github.repository }}/releases/latest/download/PointexKiosqueLauncher.apk" \
            --wifi-ssid "$WIFI_SSID" --wifi-password "$WIFI_PASSWORD" \
            --output provisioning_qr.png

      - name: Upload QR code to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.ref_name }}" provisioning_qr.png

  qr-display-winforms:
    needs: release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build release
        run: dotnet build qr-display-winforms -c Release

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.ref_name }}" qr-display-winforms\bin\Release\net48\PrepaKiosquePointex.exe
