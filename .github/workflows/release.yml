name: Release

# Triggered by pushing a version tag (e.g. `v1.0.3`):
#   git tag v1.0.3 && git push origin v1.0.3
#
# Builds the signed release APK, publishes it as a GitHub Release asset
# named `app-release.apk`, then regenerates the Device Owner provisioning
# QR code (tools/generate_provisioning_qr.py) pointing at the stable
# `releases/latest/download/app-release.apk` URL and uploads it as
# `provisioning_qr.png` on the same release.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      # Same debug keystore used for local releases, so every build shares
      # the same signing certificate and can be installed as an update.
      - name: Restore release keystore
        run: |
          mkdir -p ~/.android
          echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 -d > ~/.android/debug.keystore

      - name: Build release APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            app/build/outputs/apk/release/app-release.apk \
            --title "PointexKioskLauncher ${{ github.ref_name }}" \
            --generate-notes

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate provisioning QR code
        run: |
          pip install "qrcode[pil]"
          python tools/generate_provisioning_qr.py \
            app/build/outputs/apk/release/app-release.apk \
            "https://github.com/${{ github.repository }}/releases/latest/download/app-release.apk" \
            --output provisioning_qr.png

      - name: Upload QR code to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.ref_name }}" provisioning_qr.png
